<script>
function exitWear() {
  let fallbackUrl = 'http://127.0.0.1:5174/';
  try {
    if (document.referrer) {
      const referrerUrl = new URL(document.referrer);
      if (!referrerUrl.pathname.includes('/ar-wear.html')) fallbackUrl = referrerUrl.href;
    }
  } catch (_) {}
  try { window.close(); } catch (_) {}
  window.setTimeout(() => {
    if (!document.hidden) window.location.href = fallbackUrl;
  }, 80);
}

// 全局 AR 控制函数（由 module 脚本挂载真正的实现）
let orientationLocked = false;
function toggleOrientationLock() {
  if (typeof window.__arToggleLock === 'function') return window.__arToggleLock();
}
function captureSnapshot() {
  if (typeof window.__arCapture === 'function') return window.__arCapture();
}
function toggleDebugAnchors() {
  if (typeof window.__arToggleDebug === 'function') return window.__arToggleDebug();
}
function selectMaskByIndex(idx) {
  if (typeof window.__arSelectMask === 'function') return window.__arSelectMask(idx);
}
const toastEl = document.getElementById('toast');
let toastTimer = 0;
function showToast(text, timeout = 1600) {
  if (!toastEl) return;
  toastEl.textContent = text;
  toastEl.classList.add('show');
  window.clearTimeout(toastTimer);
  toastTimer = window.setTimeout(() => toastEl.classList.remove('show'), timeout);
}
</script>

function fitMaskModel(model, rotateY = true) {
  const box = new THREE.Box3().setFromObject(model);
  const size = new THREE.Vector3();
  const center = new THREE.Vector3();
  box.getSize(size);
  box.getCenter(center);

  const maxDim = Math.max(size.x, size.y, size.z);
  if (maxDim > 0.001) {
    const invMaxDim = 1.0 / maxDim;
    const noseAnchor = rotateY ? MASK_NOSE_ANCHOR : FALLBACK_NOSE_ANCHOR;
    const anchor = new THREE.Vector3(
      center.x + noseAnchor.x * maxDim,
      center.y + noseAnchor.y * maxDim,
      center.z + noseAnchor.z * maxDim
    );
    anchor.multiplyScalar(invMaxDim);

    model.scale.setScalar(invMaxDim);
    if (rotateY) {
      model.rotation.set(PROFILE_MODEL_ROTATION.x || 0, PROFILE_MODEL_ROTATION.y || 0, PROFILE_MODEL_ROTATION.z || 0);
    } else {
      model.rotation.set(0, 0, 0);
    }
    model.position.copy(anchor.applyEuler(model.rotation).multiplyScalar(-1));
    maskModelWidth = Math.max(size.x / maxDim, 0.001);
  } else {
    maskModelWidth = 1.0;
  }
}

function normalizeModelUrl(url) {
  return new URL(url, location.href).href;
}

function modelsAreSame(a, b) {
  try {
    return normalizeModelUrl(a) === normalizeModelUrl(b);
  } catch (_) {
    return String(a || '') === String(b || '');
  }
}

function mergeWearLibrary(generatedModels = []) {
  const startModel = {
    id: 'current-url-model',
    name: '当前面具',
    url: activeModelUrl,
    wearProfile: initialWearProfile
  };
  const source = [
    ...generatedModels.map((item) => ({
      id: item.id,
      name: item.name || 'AI 生成面具',
      url: item.glbUrl,
      wearProfile: item.wearProfile || inferWearProfile(item.glbUrl)
    })),
    ...builtInModelLibrary,
    startModel
  ].filter((item) => item.url);

  const seen = new Set();
  modelLibrary = source.filter((item) => {
    const key = normalizeModelUrl(item.url);
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });
  activeModelIndex = Math.max(0, modelLibrary.findIndex((item) => modelsAreSame(item.url, activeModelUrl)));
  if (activeModelIndex < 0) activeModelIndex = 0;
  log(`Wear model library ready: ${modelLibrary.length}`);
  if (typeof renderModelBar === 'function') renderModelBar();
}

async function loadWearLibrary() {
  try {
    const resp = await fetch('./api/generated-models');
    const data = resp.ok ? await resp.json() : { models: [] };
    mergeWearLibrary(data.models || []);
  } catch (e) {
    log('Wear model library unavailable: ' + (e.message || e));
    mergeWearLibrary([]);
  }
}

function disposeObject3D(obj) {
  obj.traverse((child) => {
    if (!child.isMesh) return;
    if (child.geometry) child.geometry.dispose();
    const mats = Array.isArray(child.material) ? child.material : [child.material];
    mats.filter(Boolean).forEach((mat) => mat.dispose?.());
  });
}

function prepareMaskModel(model) {
  model.traverse(c => {
    if (!c.isMesh || !c.material) return;
    const mats = Array.isArray(c.material) ? c.material : [c.material];
    mats.forEach(m => {
      if (!m) return;
      if (m.map) m.map.colorSpace = THREE.SRGBColorSpace;
      if (m.emissiveMap) m.emissiveMap.colorSpace = THREE.SRGBColorSpace;
      m.side = THREE.DoubleSide;
      m.depthWrite = true;
    });
  });
}

function loadMaskModel(url, profileName, options = {}) {
  const { initial = false, label = '面具' } = options;
  const resolvedProfile = profileName || inferWearProfile(url);
  return new Promise((resolve, reject) => {
    new GLTFLoader().load(
      url,
      (gltf) => {
        log('GLB loaded successfully: ' + url);
        setActiveWearProfile(resolvedProfile);
        const nextMask = gltf.scene;
        prepareMaskModel(nextMask);
        fitMaskModel(nextMask);
        const previousMask = maskModel;
        maskModel = nextMask;
        faceObj.add(maskModel);
        if (previousMask) {
          faceObj.remove(previousMask);
          disposeObject3D(previousMask);
        }
        activeModelUrl = url;
        gltfReady = true;
        setStep(initial ? '步骤 2/4: 3D面具加载完成' : `已切换:${label}`, initial ? '等待人脸模型...' : '手划过脸可继续切换');
        tryStartCamera();
        resolve(maskModel);
      },
      (xhr) => {
        if (xhr.total > 0 && initial) {
          const pct = Math.round(xhr.loaded / xhr.total * 100);
          stepDetail.textContent = `加载中... ${pct}%`;
        }
      },
      reject
    );
  });
}

function videoToCanvas(vx, vy) {
  const vW = video.videoWidth, vH = video.videoHeight;
  const cW = window.innerWidth, cH = window.innerHeight;
  if (!vW || !vH) return { x: vx, y: vy };
  const x = MIRROR_VIDEO ? 1 - vx : vx;
  const vAsp = vW / vH, cAsp = cW / cH;
  let s, ox, oy;
  if (vAsp > cAsp) {
    s = cH / vH;
    ox = (cW - vW * s) / 2;
    oy = 0;
  } else {
    s = cW / vW;
    ox = 0;
    oy = (cH - vH * s) / 2;
  }
  const px = x * vW * s + ox;
  const py = vy * vH * s + oy;
  return { x: px / cW, y: py / cH };
}

const swipeState = {
  active: false,
  startX: 0,
  startY: 0,
  startT: 0,
  lastX: 0,
  lastY: 0,
  lastT: 0,
  lastSwitchT: 0,
};

function resetSwipeState() {
  swipeState.active = false;
}

function getFaceSwipeBounds(lm) {
  if (!lm) return null;
  const indices = [10, 152, 127, 356, 234, 454, 33, 263, 1, 13, 14];
  let left = Infinity, right = -Infinity, top = Infinity, bottom = -Infinity;
  for (const idx of indices) {
    const p = lm[idx];
    if (!p) continue;
    const c = videoToCanvas(p.x, p.y);
    left = Math.min(left, c.x);
    right = Math.max(right, c.x);
    top = Math.min(top, c.y);
    bottom = Math.max(bottom, c.y);
  }
  if (!Number.isFinite(left) || right <= left || bottom <= top) return null;
  const width = right - left;
  const height = bottom - top;
  return {
    left: Math.max(0, left - width * 0.42),
    right: Math.min(1, right + width * 0.42),
    top: Math.max(0, top - height * 0.18),
    bottom: Math.min(1, bottom + height * 0.20),
    cx: (left + right) / 2,
    cy: (top + bottom) / 2,
    width,
    height,
  };
}

function rememberFaceSwipeBounds(lm, now) {
  const bounds = getFaceSwipeBounds(lm);
  if (!bounds) return null;
  lastFaceSwipeBounds = bounds;
  lastFaceSwipeBoundsT = now;
  return bounds;
}

function getPalmCenter(handLm) {
  const indices = [0, 5, 9, 13, 17];
  let x = 0, y = 0, n = 0;
  for (const idx of indices) {
    const p = handLm?.[idx];
    if (!p) continue;
    const c = videoToCanvas(p.x, p.y);
    x += c.x;
    y += c.y;
    n++;
  }
  if (!n) return null;
  return { x: x / n, y: y / n };
}

function updateSwipeGesture(point, bounds, now) {
  const nearX = point.x >= bounds.left && point.x <= bounds.right;
  const nearY = point.y >= bounds.top && point.y <= bounds.bottom;
  if (!nearX || !nearY) {
    if (swipeState.active && now - swipeState.lastT > 240) resetSwipeState();
    return;
  }

  if (!swipeState.active || now - swipeState.startT > 1100) {
    swipeState.active = true;
    swipeState.startX = point.x;
    swipeState.startY = point.y;
    swipeState.startT = now;
    swipeState.lastX = point.x;
    swipeState.lastY = point.y;
    swipeState.lastT = now;
    return;
  }

  const dx = point.x - swipeState.startX;
  const dy = point.y - swipeState.startY;
  const duration = Math.max(now - swipeState.startT, 1);
  const crossedCenter =
    Math.min(swipeState.startX, point.x) < bounds.cx - bounds.width * 0.12 &&
    Math.max(swipeState.startX, point.x) > bounds.cx + bounds.width * 0.12;
  const enoughDistance = Math.abs(dx) > Math.max(bounds.width * 0.70, 0.18);
  const verticalStable = Math.abs(dy) < Math.max(bounds.height * 0.65, 0.16);
  const fastEnough = Math.abs(dx) / duration > 0.00028;
  const cooledDown = now - swipeState.lastSwitchT > 1500;

  swipeState.lastX = point.x;
  swipeState.lastY = point.y;
  swipeState.lastT = now;

  if (crossedCenter && enoughDistance && verticalStable && fastEnough && cooledDown) {
    swipeState.lastSwitchT = now;
    resetSwipeState();
    switchToNextModel();
  }
}

function detectHandSwipe(now) {
  if (!handLandmarkerReady || !handLandmarkerInstance || handFramePending || now - lastHandFrameTime < 85) return;
  if (video.readyState < 2) return;

  lastHandFrameTime = now;
  handFramePending = true;
  try {
    const result = handLandmarkerInstance.detectForVideo(video, now);
    const handLm = result?.landmarks?.[0] || null;
    handFound = Boolean(handLm);
    if (!handLm) {
      resetSwipeState();
      return;
    }
    const bounds = currentLandmarks
      ? rememberFaceSwipeBounds(currentLandmarks, now)
      : (now - lastFaceSwipeBoundsT < 1500 ? lastFaceSwipeBounds : null);
    const palm = getPalmCenter(handLm);
    if (bounds && palm) updateSwipeGesture(palm, bounds, now);
  } catch (e) {
    log('HandLandmarker frame error: ' + (e.message || e));
  } finally {
    handFramePending = false;
  }
}

function renderLoop() {
  const now = performance.now();
  frameCount++;
  if (now - lastFpsT > 1000) {
    fps = Math.round(frameCount * 1000 / (now - lastFpsT));
    frameCount = 0;
    lastFpsT = now;
  }

  if (currentLandmarks) {
    faceObj.visible = applyPose(currentLandmarks, currentMatrixData);
    rememberFaceSwipeBounds(currentLandmarks, now);
  } else {
    faceObj.visible = false;
    poseReady = false;
  }

  const activeModelName = modelLibrary[activeModelIndex]?.name || '当前面具';
  hud.textContent = `Face: ${faceFound ? 'tracking' : 'searching'} | Hand: ${handLandmarkerReady ? (handFound ? 'swipe ready' : 'ready') : 'off'} | Mask: ${activeModelName} | FPS: ${fps}`;
  renderer.render(scene, camera);
  drawDebugAnchors();
  requestAnimationFrame(renderLoop);
}

const debugProject = new THREE.Vector3();
function worldToDebugScreen(v) {
  debugProject.copy(v).project(camera);
  return {
    x: (debugProject.x * 0.5 + 0.5) * window.innerWidth,
    y: (-debugProject.y * 0.5 + 0.5) * window.innerHeight,
    visible: debugProject.z >= -1 && debugProject.z <= 1,
  };
}

function drawDebugPoint(ctx, p, color, label) {
  if (!p.visible) return;
  ctx.beginPath();
  ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
  ctx.fillStyle = color;
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.fillText(label, p.x + 7, p.y - 7);
}

function drawDebugAnchors() {
  if (!DEBUG_ANCHORS || !debugCtx) return;
  const dpr = Math.min(window.devicePixelRatio, 2);
  debugCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
  debugCtx.clearRect(0, 0, window.innerWidth, window.innerHeight);
  if (!faceObj.visible || !poseReady) return;

  debugCtx.lineWidth = 1.5;
  debugCtx.font = '11px monospace';
  const labels = {
    nose: 'N',
    noseBridge: 'NB',
    leftEye: 'L',
    rightEye: 'R',
    leftCheek: 'LC',
    rightCheek: 'RC',
    leftTemple: 'LT',
    rightTemple: 'RT',
    leftJaw: 'LJ',
    rightJaw: 'RJ',
    forehead: 'F',
    mouth: 'M',
    chin: 'C',
  };
  for (const key of Object.keys(labels)) {
    const facePoint = worldToDebugScreen(debugFaceAnchors[key]);
    const modelPoint = worldToDebugScreen(debugModelAnchors[key]);
    if (facePoint.visible && modelPoint.visible) {
      debugCtx.beginPath();
      debugCtx.moveTo(facePoint.x, facePoint.y);
      debugCtx.lineTo(modelPoint.x, modelPoint.y);
      debugCtx.strokeStyle = 'rgba(255,255,255,0.45)';
      debugCtx.stroke();
    }
    drawDebugPoint(debugCtx, facePoint, '#3dd68c', labels[key]);
    drawDebugPoint(debugCtx, modelPoint, '#ff4fb3', labels[key]);
  }
}

function averageLandmark(lm, indices, out) {
  out.x = 0;
  out.y = 0;
  out.z = 0;
  let n = 0;
  for (const idx of indices) {
    const p = lm[idx];
    if (!p) continue;
    out.x += p.x;
    out.y += p.y;
    out.z += p.z || 0;
    n++;
  }
  if (!n) return null;
  out.x /= n;
  out.y /= n;
  out.z /= n;
  return out;
}

function applyPose(lm, matrixData) {
  const L_EAR = 234, R_EAR = 454;
  const le = lm[L_EAR], re = lm[R_EAR];
  const nose = averageLandmark(lm, FACE_LANDMARKS.nose, avgNoseLandmark);
  const noseBridge = averageLandmark(lm, FACE_LANDMARKS.noseBridge, avgNoseBridgeLandmark);
  const eyeA = averageLandmark(lm, FACE_LANDMARKS.leftEye, avgLeftEyeLandmark);
  const eyeB = averageLandmark(lm, FACE_LANDMARKS.rightEye, avgRightEyeLandmark);
  const cheekA = averageLandmark(lm, FACE_LANDMARKS.leftCheek, avgLeftCheekLandmark);
  const cheekB = averageLandmark(lm, FACE_LANDMARKS.rightCheek, avgRightCheekLandmark);
  const templeA = averageLandmark(lm, FACE_LANDMARKS.leftTemple, avgLeftTempleLandmark);
  const templeB = averageLandmark(lm, FACE_LANDMARKS.rightTemple, avgRightTempleLandmark);
  const jawA = averageLandmark(lm, FACE_LANDMARKS.leftJaw, avgLeftJawLandmark);
  const jawB = averageLandmark(lm, FACE_LANDMARKS.rightJaw, avgRightJawLandmark);
  const forehead = averageLandmark(lm, FACE_LANDMARKS.forehead, avgForeheadLandmark);
  const mouth = averageLandmark(lm, FACE_LANDMARKS.mouth, avgMouthLandmark);
  const chin = averageLandmark(lm, FACE_LANDMARKS.chin, avgChinLandmark);

  if (!le || !re || !nose || !noseBridge || !eyeA || !eyeB || !cheekA || !cheekB || !templeA || !templeB || !jawA || !jawB || !forehead || !mouth || !chin) {
    poseReady = false;
    return false;
  }

  const canvasAspect = window.innerWidth / window.innerHeight;
  const halfTanFOVY = Math.tan(THREE.MathUtils.degToRad(FOV_DEG / 2));
  const halfTanFOVX = halfTanFOVY * canvasAspect;

  function toC(lmk) { return videoToCanvas(lmk.x, lmk.y); }
  function toNDC(cx, cy) {
    return { x: (cx - 0.5) * 2, y: (0.5 - cy) * 2 };
  }

  const leC = toC(le), reC = toC(re);
  const noseC = toC(nose), chinC = toC(chin);
  const eyeAC = toC(eyeA), eyeBC = toC(eyeB);
  const cheekAC = toC(cheekA), cheekBC = toC(cheekB);
  const templeAC = toC(templeA), templeBC = toC(templeB);
  const jawAC = toC(jawA), jawBC = toC(jawB);
  const screenLeftEyeLandmark = eyeAC.x <= eyeBC.x ? eyeA : eyeB;
  const screenRightEyeLandmark = eyeAC.x <= eyeBC.x ? eyeB : eyeA;
  const screenLeftEye = eyeAC.x <= eyeBC.x ? eyeAC : eyeBC;
  const screenRightEye = eyeAC.x <= eyeBC.x ? eyeBC : eyeAC;
  const screenLeftCheekLandmark = cheekAC.x <= cheekBC.x ? cheekA : cheekB;
  const screenRightCheekLandmark = cheekAC.x <= cheekBC.x ? cheekB : cheekA;
  const screenLeftTempleLandmark = templeAC.x <= templeBC.x ? templeA : templeB;
  const screenRightTempleLandmark = templeAC.x <= templeBC.x ? templeB : templeA;
  const screenLeftJawLandmark = jawAC.x <= jawBC.x ? jawA : jawB;
  const screenRightJawLandmark = jawAC.x <= jawBC.x ? jawB : jawA;

  const leN = toNDC(leC.x, leC.y);
  const reN = toNDC(reC.x, reC.y);
  const faceW = Math.abs(reN.x - leN.x) / 2;
  if (faceW < 0.08) {
    poseReady = false;
    return false;
  }

  const D = FACE_WORLD_WIDTH / (2.0 * faceW * halfTanFOVX);
  const eyeDx = screenRightEye.x - screenLeftEye.x;
  const eyeDy = screenRightEye.y - screenLeftEye.y;
  const rawRZ = THREE.MathUtils.clamp(-Math.atan2(eyeDy, eyeDx), -0.65, 0.65);

  const eyeMidX = (screenLeftEye.x + screenRightEye.x) / 2;
  const eyeDist = Math.max(Math.abs(screenRightEye.x - screenLeftEye.x), 0.001);
  const yawRatio = (noseC.x - eyeMidX) / eyeDist;
  const yawAbs = THREE.MathUtils.clamp(Math.abs(yawRatio), 0, 1.35);
  const rawRY = THREE.MathUtils.clamp(yawRatio * 2.0, -0.9, 0.9);

  const eyeMidY = (screenLeftEye.y + screenRightEye.y) / 2;
  const eyeToNoseY = Math.abs(noseC.y - eyeMidY);
  const eyeToChinY = Math.max(Math.abs(chinC.y - eyeMidY), 0.001);
  const faceRatio = eyeToNoseY / eyeToChinY;
  const rawRX = THREE.MathUtils.clamp(-(faceRatio - 0.45) * 3.0, -0.55, 0.55);

  if (matrixData && matrixData.length === 16) {
    targetMatrix.fromArray(matrixData);
    if (MIRROR_VIDEO) {
      targetMatrix.premultiply(mirrorMatrix).multiply(mirrorMatrix);
    }
    targetQuat.setFromRotationMatrix(targetMatrix);
  } else {
    targetEuler.set(rawRX, rawRY, rawRZ, 'YXZ');
    targetQuat.setFromEuler(targetEuler);
  }
  targetQuat.multiply(maskFacingCorrection);
  targetQuat.normalize();

  // 锁定朝向：忽略头部姿态，面具保持正面朝向镜头
  if (orientationLocked) {
    targetQuat.copy(lockedQuat);
  }

  function toWorldFeature(lmk, out) {
    const c = toC(lmk);
    const n = toNDC(c.x, c.y);
    return out.set(
      n.x * D * halfTanFOVX,
      n.y * D * halfTanFOVY,
      -D - ((lmk.z || 0) - (nose.z || 0)) * D * FACE_DEPTH_SCALE
    );
  }

  toWorldFeature(nose, faceFeatureNose);
  toWorldFeature(noseBridge, faceFeatureNoseBridge);
  toWorldFeature(screenLeftEyeLandmark, faceFeatureLeftEye);
  toWorldFeature(screenRightEyeLandmark, faceFeatureRightEye);
  toWorldFeature(screenLeftCheekLandmark, faceFeatureLeftCheek);
  toWorldFeature(screenRightCheekLandmark, faceFeatureRightCheek);
  toWorldFeature(screenLeftTempleLandmark, faceFeatureLeftTemple);
  toWorldFeature(screenRightTempleLandmark, faceFeatureRightTemple);
  toWorldFeature(screenLeftJawLandmark, faceFeatureLeftJaw);
  toWorldFeature(screenRightJawLandmark, faceFeatureRightJaw);
  toWorldFeature(forehead, faceFeatureForehead);
  toWorldFeature(mouth, faceFeatureMouth);
  toWorldFeature(chin, faceFeatureChin);

  const faceEyeDistance = faceFeatureLeftEye.distanceTo(faceFeatureRightEye);
  const faceCheekDistance = faceFeatureLeftCheek.distanceTo(faceFeatureRightCheek);
  const faceTempleDistance = faceFeatureLeftTemple.distanceTo(faceFeatureRightTemple);
  const faceNoseChinDistance = faceFeatureNose.distanceTo(faceFeatureChin);
  const modelNoseChinDistance = MODEL_FEATURES.nose.distanceTo(MODEL_FEATURES.chin);
  const scaleFromEyes = faceEyeDistance / MODEL_EYE_DISTANCE;
  const scaleFromCheeks = faceCheekDistance / MODEL_CHEEK_DISTANCE;
  const scaleFromTemples = faceTempleDistance / MODEL_TEMPLE_DISTANCE;
  const scaleFromChin = faceNoseChinDistance / Math.max(modelNoseChinDistance, 0.001);
  const targetScale = THREE.MathUtils.clamp(
    (
      scaleFromEyes * PROFILE_SCALE_WEIGHTS.eyes +
      scaleFromCheeks * PROFILE_SCALE_WEIGHTS.cheeks +
      scaleFromTemples * PROFILE_SCALE_WEIGHTS.temples +
      scaleFromChin * PROFILE_SCALE_WEIGHTS.chin
    ) * MASK_FIT_SCALE,
    0.25,
    8
  );

  faceOutDir.set(0, 0, -1).applyQuaternion(targetQuat).normalize();
  if (faceOutDir.z < 0) faceOutDir.negate();
  faceOutDir.lerp(cameraForwardDir, THREE.MathUtils.clamp(yawAbs * 0.4, 0, 0.55)).normalize();
  faceOutDir.multiplyScalar(targetScale * (FACE_SURFACE_OFFSET + yawAbs * FACE_YAW_FORWARD_OFFSET));
  faceFeatureNose.add(faceOutDir);
  faceFeatureNoseBridge.add(faceOutDir);
  faceFeatureLeftEye.add(faceOutDir);
  faceFeatureRightEye.add(faceOutDir);
  faceFeatureLeftCheek.add(faceOutDir);
  faceFeatureRightCheek.add(faceOutDir);
  faceFeatureLeftTemple.add(faceOutDir);
  faceFeatureRightTemple.add(faceOutDir);
  faceFeatureLeftJaw.add(faceOutDir);
  faceFeatureRightJaw.add(faceOutDir);
  faceFeatureForehead.add(faceOutDir);
  faceFeatureMouth.add(faceOutDir);
  faceFeatureChin.add(faceOutDir);

  function featurePositionFor(facePoint, modelPoint, weight) {
    featureOffset.copy(modelPoint)
      .multiplyScalar(targetScale)
      .applyQuaternion(targetQuat);
    featureTarget.copy(facePoint).sub(featureOffset);
    featureSum.addScaledVector(featureTarget, weight);
    return weight;
  }

  featureSum.set(0, 0, 0);
  let totalWeight = 0;
  const featureBoost = 1 + yawAbs * 0.75;
  const sideBoost = 1 + yawAbs * 1.4;
  totalWeight += featurePositionFor(faceFeatureNose, MODEL_FEATURES.nose, PROFILE_WEIGHTS.nose * featureBoost);
  totalWeight += featurePositionFor(faceFeatureNoseBridge, MODEL_FEATURES.noseBridge, PROFILE_WEIGHTS.noseBridge * featureBoost);
  totalWeight += featurePositionFor(faceFeatureLeftEye, MODEL_FEATURES.rightEye, PROFILE_WEIGHTS.eyes * featureBoost);
  totalWeight += featurePositionFor(faceFeatureRightEye, MODEL_FEATURES.leftEye, PROFILE_WEIGHTS.eyes * featureBoost);
  totalWeight += featurePositionFor(faceFeatureLeftCheek, MODEL_FEATURES.rightCheek, PROFILE_WEIGHTS.cheeks * sideBoost);
  totalWeight += featurePositionFor(faceFeatureRightCheek, MODEL_FEATURES.leftCheek, PROFILE_WEIGHTS.cheeks * sideBoost);
  totalWeight += featurePositionFor(faceFeatureLeftTemple, MODEL_FEATURES.rightTemple, PROFILE_WEIGHTS.temples * sideBoost);
  totalWeight += featurePositionFor(faceFeatureRightTemple, MODEL_FEATURES.leftTemple, PROFILE_WEIGHTS.temples * sideBoost);
  totalWeight += featurePositionFor(faceFeatureLeftJaw, MODEL_FEATURES.rightJaw, PROFILE_WEIGHTS.jaws * sideBoost);
  totalWeight += featurePositionFor(faceFeatureRightJaw, MODEL_FEATURES.leftJaw, PROFILE_WEIGHTS.jaws * sideBoost);
  totalWeight += featurePositionFor(faceFeatureForehead, MODEL_FEATURES.forehead, PROFILE_WEIGHTS.forehead * featureBoost);
  totalWeight += featurePositionFor(faceFeatureMouth, MODEL_FEATURES.mouth, PROFILE_WEIGHTS.mouth);
  totalWeight += featurePositionFor(faceFeatureChin, MODEL_FEATURES.chin, PROFILE_WEIGHTS.chin);
  targetPos.copy(featureSum).divideScalar(totalWeight);

  const a = SMOOTH;
  if (!poseReady) {
    smoothPos.copy(targetPos);
    smoothQuat.copy(targetQuat);
    sS = targetScale;
    poseReady = true;
  } else {
    smoothPos.lerp(targetPos, 1 - a);
    smoothQuat.slerp(targetQuat, 1 - a);
    sS = sS * a + targetScale * (1 - a);
  }

  faceObj.position.copy(smoothPos);
  faceObj.quaternion.copy(smoothQuat);
  faceObj.scale.setScalar(sS);

  if (DEBUG_ANCHORS) {
    debugFaceAnchors.nose.copy(faceFeatureNose);
    debugFaceAnchors.noseBridge.copy(faceFeatureNoseBridge);
    debugFaceAnchors.leftEye.copy(faceFeatureLeftEye);
    debugFaceAnchors.rightEye.copy(faceFeatureRightEye);
    debugFaceAnchors.leftCheek.copy(faceFeatureLeftCheek);
    debugFaceAnchors.rightCheek.copy(faceFeatureRightCheek);
    debugFaceAnchors.leftTemple.copy(faceFeatureLeftTemple);
    debugFaceAnchors.rightTemple.copy(faceFeatureRightTemple);
    debugFaceAnchors.leftJaw.copy(faceFeatureLeftJaw);
    debugFaceAnchors.rightJaw.copy(faceFeatureRightJaw);
    debugFaceAnchors.forehead.copy(faceFeatureForehead);
    debugFaceAnchors.mouth.copy(faceFeatureMouth);
    debugFaceAnchors.chin.copy(faceFeatureChin);
    debugModelAnchors.nose.copy(MODEL_FEATURES.nose).multiplyScalar(sS).applyQuaternion(smoothQuat).add(smoothPos);
    debugModelAnchors.noseBridge.copy(MODEL_FEATURES.noseBridge).multiplyScalar(sS).applyQuaternion(smoothQuat).add(smoothPos);
    debugModelAnchors.leftEye.copy(MODEL_FEATURES.rightEye).multiplyScalar(sS).applyQuaternion(smoothQuat).add(smoothPos);
    debugModelAnchors.rightEye.copy(MODEL_FEATURES.leftEye).multiplyScalar(sS).applyQuaternion(smoothQuat).add(smoothPos);
    debugModelAnchors.leftCheek.copy(MODEL_FEATURES.rightCheek).multiplyScalar(sS).applyQuaternion(smoothQuat).add(smoothPos);
    debugModelAnchors.rightCheek.copy(MODEL_FEATURES.leftCheek).multiplyScalar(sS).applyQuaternion(smoothQuat).add(smoothPos);
    debugModelAnchors.leftTemple.copy(MODEL_FEATURES.rightTemple).multiplyScalar(sS).applyQuaternion(smoothQuat).add(smoothPos);
    debugModelAnchors.rightTemple.copy(MODEL_FEATURES.leftTemple).multiplyScalar(sS).applyQuaternion(smoothQuat).add(smoothPos);
    debugModelAnchors.leftJaw.copy(MODEL_FEATURES.rightJaw).multiplyScalar(sS).applyQuaternion(smoothQuat).add(smoothPos);
    debugModelAnchors.rightJaw.copy(MODEL_FEATURES.leftJaw).multiplyScalar(sS).applyQuaternion(smoothQuat).add(smoothPos);
    debugModelAnchors.forehead.copy(MODEL_FEATURES.forehead).multiplyScalar(sS).applyQuaternion(smoothQuat).add(smoothPos);
    debugModelAnchors.mouth.copy(MODEL_FEATURES.mouth).multiplyScalar(sS).applyQuaternion(smoothQuat).add(smoothPos);
    debugModelAnchors.chin.copy(MODEL_FEATURES.chin).multiplyScalar(sS).applyQuaternion(smoothQuat).add(smoothPos);
  }

  return true;
}

// ===== AR 控制功能挂载 =====
let orientationLocked = false;
const lockedQuat = new THREE.Quaternion();
const lockedEuler = new THREE.Euler(0, Math.PI, 0, 'YXZ');
const lockBtn = document.getElementById('lock-btn');
const shotBtn = document.getElementById('shot-btn');
const debugBtn = document.getElementById('debug-btn');
const modelBar = document.getElementById('model-bar');

// 锁定/解锁朝向：锁定时面具只跟随头部位置，不跟随姿态（保持正面朝向镜头）
window.__arToggleLock = function () {
  orientationLocked = !orientationLocked;
  if (orientationLocked) {
    lockedEuler.set(0, Math.PI, 0, 'YXZ');
    lockedQuat.setFromEuler(lockedEuler).multiply(maskFacingCorrection).normalize();
  }
  if (lockBtn) {
    lockBtn.textContent = orientationLocked ? '解锁朝向' : '锁定朝向';
    lockBtn.classList.toggle('active', orientationLocked);
  }
  showToast(orientationLocked ? '朝向已锁定：面具保持正面' : '朝向已解锁：跟随头部姿态');
  log('Orientation lock: ' + (orientationLocked ? 'ON' : 'OFF'));
};

// 截图：合成 video + three canvas
window.__arCapture = function () {
  try {
    const w = window.innerWidth;
    const h = window.innerHeight;
    const out = document.createElement('canvas');
    out.width = w;
    out.height = h;
    const ctx = out.getContext('2d');
    if (MIRROR_VIDEO) {
      ctx.save();
      ctx.scale(-1, 1);
      ctx.drawImage(video, -w, 0, w, h);
      ctx.restore();
    } else {
      ctx.drawImage(video, 0, 0, w, h);
    }
    ctx.drawImage(threeCanvas, 0, 0, w, h);
    out.toBlob((blob) => {
      if (!blob) { showToast('截图失败'); return; }
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `ar-wear-${Date.now()}.png`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
      showToast('已保存截图');
    }, 'image/png');
  } catch (e) {
    log('Capture error: ' + (e.message || e));
    showToast('截图失败');
  }
};

// 调试锚点开关
window.__arToggleDebug = function () {
  DEBUG_ANCHORS = !DEBUG_ANCHORS;
  debugCanvas.style.display = DEBUG_ANCHORS ? 'block' : 'none';
  if (debugBtn) debugBtn.classList.toggle('active', DEBUG_ANCHORS);
  showToast(DEBUG_ANCHORS ? '锚点可视化已开启' : '锚点可视化已关闭');
};
// 初始同步
if (DEBUG_ANCHORS) { debugBtn.classList.add('active'); }

// 模型选择条：点击切换
window.__arSelectMask = function (idx) {
  if (modelSwitching || idx === activeModelIndex || idx < 0 || idx >= modelLibrary.length) return;
  const target = modelLibrary[idx];
  showGestureHint(`切换:${target.name || '面具'}`);
  modelSwitching = true;
  loadMaskModel(target.url, target.wearProfile, { label: target.name || '面具' })
    .then(() => { activeModelIndex = idx; renderModelBar(); })
    .catch((e) => { log('Select mask failed: ' + (e.message || e)); showToast('切换失败'); })
    .finally(() => { setTimeout(() => { modelSwitching = false; }, 650); });
};

function renderModelBar() {
  if (!modelBar) return;
  modelBar.innerHTML = '';
  modelLibrary.forEach((item, idx) => {
    const chip = document.createElement('button');
    chip.type = 'button';
    chip.className = 'model-chip' + (idx === activeModelIndex ? ' active' : '');
    chip.textContent = item.name || `面具 ${idx + 1}`;
    chip.title = item.name || item.url;
    chip.addEventListener('click', () => window.__arSelectMask(idx));
    modelBar.appendChild(chip);
  });
}

// 初次渲染模型条（待 modelLibrary 就绪后会重渲染）
renderModelBar();
</script>
